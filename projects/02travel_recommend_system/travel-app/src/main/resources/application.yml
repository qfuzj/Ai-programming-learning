spring:
  application:
    name: llm-travel-advisor
  profiles:
    active: dev

  # 数据源配置
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:travel_recommend_system}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:wo221000}
    hikari:
      connection-test-query: SELECT 1
      connection-timeout: 60000
      idle-timeout: 500000
      max-lifetime: 540000
      maximum-pool-size: 12
      minimum-idle: 10
      pool-name: LLMTravelHikariPool

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:172.16.219.100}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080

# MyBatis-Plus 配置（顶级）
mybatis-plus:
  mapper-locations: classpath*:/com/travel/advisor/mapper/*.xml
  type-aliases-package: com.travel.advisor.entity
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      update-strategy: not_empty
  configuration:
    map-underscore-to-camel-case: true
    auto-mapping-behavior: full
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Swagger/SpringDoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# MinIO 文件存储配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://172.16.219.100:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET_NAME:travel-advisor}

# 应用自定义配置
app:
  security:
    jwt:
      issuer: llm-travel-advisor
      secret: ${JWT_SECRET:ReplaceThisWithAtLeast32ByteSecretKey123456789}
      access-token-expire-seconds:  604800 # 暂时设置7天 后面根据需要设置 7200 2小时
      refresh-token-expire-seconds: 604800 # 7天

llm:
  enabled: ${LLM_ENABLED:true}
  provider: ${LLM_PROVIDER:aliyun-dashscope}
  model-name: ${LLM_MODEL_NAME:qwen-plus}
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
  max-tokens: ${LLM_MAX_TOKENS:2048}
  timeout-ms: ${LLM_TIMEOUT_MS:10000}
  itinerary-timeout-ms: ${LLM_ITINERARY_TIMEOUT_MS:120000}
