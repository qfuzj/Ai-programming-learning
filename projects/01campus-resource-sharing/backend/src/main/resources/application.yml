server:
  port: 8080

spring:
  application:
    name: campus-resource-sharing-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_resource_sharing?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: wo221000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ReplaceWithYourOwnSecretKeyAtLeast32CharsLong
  expire-seconds: 86400
  issuer: campus-resource-sharing

logging:
  level:
    com.campus.resourcesharing: info
